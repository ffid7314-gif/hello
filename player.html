<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>PLAYER</title>

<!-- Shaka Player + Shaka UI -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.css">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #000;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .player-wrapper {
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
    }

    #video-container {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
    }

    video {
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
    }

    /* Hide the huge duration display for live streams */
    .shaka-total-time,
    .shaka-current-time {
        display: none !important;
    }

    /* Fullscreen fix */
    #video-container:fullscreen {
        width: 100vw;
        height: 100vh;
        max-width: none;
    }

    #video-container:-webkit-full-screen {
        width: 100vw;
        height: 100vh;
    }
</style>
</head>

<body>

<div class="player-wrapper">
    <div id="video-container">
        <video id="video"
               autoplay
               muted
               preload="auto"
               playsinline
               webkit-playsinline>
        </video>
    </div>
</div>

<script>
    // Channel configurations
    const channels = {
        "willow": {
            name: "Willow Cricket",
            manifest: "https://otte.cache.aiv-cdn.net/iad-nitro/live/clients/dash/enc/t2iwih5bvd/out/v1/04f7b999f7b84b56a2fc4bab5be0bfd9/cenc.mpd",
            keyId: "52f6c9edbc5f7625951859221e74ab21",
            key: "cc08ca50dcc9f2bc40dd22cffd44c34b"
        },
        "kayo": {
            name: "Kayo Sports",
            manifest: "https://dck1-ak-livedazn.akamaized.net/out/v1/814bffb9b389f652/c84a3b19a61b431a8e035dc924d9e882/index.mpd?|drmScheme=clearkey&drmLicense=4f408d05a246524895894d5a3ea13f47:e670f17598e5e3646b7c64592ad66613",
            keyId: "4f408d05a246524895894d5a3ea13f47",
            key: "e670f17598e5e3646b7c64592ad66613"
        },
        "sky": {
            name: "Sky Sports",
            manifest: "https://dice-live-oc.akamaized.net/hdntl=exp=1778882987~acl=%2f*~id=aa3812c8-c2cf-4774-ae94-e86e50dd0c79~data=hdntl,aXA9MjA4Ljg3LjI0MC4xOSZleHA9MTc3ODc5NjYxNyZlaWQ9OTM5NjY2Jm9pZD0xNTQmdHlwZT1WT0QmdWlkPXhSUnFvOXxiY2FlYTdjZi1jMzM3LTQwMzktODE1OC0zYzFjZTQ5ZTcyOTMmY2lkPWRjZS5maXNmZWQmcHQ9bnVsbA~hmac=d4a201301e06d05e9cf0ab83ae5f164bd530e3d0234c82ed17063e48b23456bd/dash/live/2093715/219027-321028/manifest-d.mpd",
            keyId: "708a98b352bd4418a73a028edd84da8f",
            key: "b1fa5c2bca4c4b57b924b748564532cb"
        },
        "skypl": {
            name: "SKY PL",
            manifest: "https://dice-live-oc.akamaized.net/hdntl=exp=1778913293~acl=%2f*~id=56d8c024-b10c-4b12-90bb-5c89431c7593~data=hdntl,aXA9MjA4Ljg3LjI0MS4yMzUmZXhwPTE3Nzg4MjY5MjMmZWlkPTkzODE0NCZvaWQ9MTU0JnR5cGU9Vk9EJnVpZD14UlJxbzl8YmNhZWE3Y2YtYzMzNy00MDM5LTgxNTgtM2MxY2U0OWU3MjkzJmNpZD1kY2UuZmlzZmVkJnB0PW51bGw~hmac=863e42f4d23efdf4ca26867460e1165eff487418eb85e20402f6975c2bf74482/dash/live/2093712/219035-321027/manifest-d.mpd",
            keyId: "7a2758575dc04d63acc3573ab594d441",
            key: "47071dd80de746a38cdc6a4dcde21abc"
        },
        "fubo": {
            name: "FUBO Sports",
            manifest: "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/3b7qwiqzk3/out/v1/9f14895badca43e6a716db021dcd0c31/cenc.mpd",
            keyId: "dc69b6159a0f9f0a4e03b3ff91cbacd5",
            key: "d0dcbcd7723bc40df0bf34c9c092d51f"
        }
    };

    let player = null;
    let ui = null;
    let retryCount = 0;
    let keepAliveInterval = null;

    async function initPlayer() {
        const params = new URLSearchParams(window.location.search);
        let channelId = params.get('id') || 'skypl';
        const channel = channels[channelId];

        if (!channel) {
            console.error('Channel not found');
            return;
        }

        console.log(`Loading: ${channel.name}`);

        const video = document.getElementById('video');
        const videoContainer = document.getElementById('video-container');

        // Destroy existing player and UI
        if (ui) {
            ui.destroy();
            ui = null;
        }
        if (player) {
            player.destroy();
            player = null;
        }
        if (keepAliveInterval) {
            clearInterval(keepAliveInterval);
            keepAliveInterval = null;
        }

        // Reset video element
        video.pause();
        video.src = '';
        video.load();

        // Create Shaka Player
        player = new shaka.Player(video);

        // =============================================
        // Configure streaming FIRST
        // =============================================
        player.configure({
            streaming: {
                durationBackoff: 0,
                liveSync: true,
                liveSyncDuration: 10,
                lowLatencyMode: true,
                bufferingGoal: 20,
                rebufferingGoal: 2,
                bufferBehind: 20,
                retryParameters: {
                    maxAttempts: 10,
                    baseDelay: 1000,
                    backoffFactor: 2,
                    timeout: 30000
                }
            }
        });

        // =============================================
        // DRM Configuration
        // =============================================
        let drmConfig = {
            drm: {
                clearKeys: {
                    [channel.keyId]: channel.key
                },
                servers: {
                    'org.w3.clearkey': ''
                },
                retryParameters: {
                    maxAttempts: 10,
                    baseDelay: 1000,
                    backoffFactor: 2,
                    timeout: 30000
                }
            },
            streaming: {
                durationBackoff: 0,
                liveSync: true,
                liveSyncDuration: 10,
                lowLatencyMode: true,
                bufferingGoal: 20,
                rebufferingGoal: 2,
                bufferBehind: 20,
                retryParameters: {
                    maxAttempts: 10,
                    baseDelay: 1000,
                    backoffFactor: 2,
                    timeout: 30000
                }
            },
            manifest: {
                retryParameters: {
                    maxAttempts: 10,
                    baseDelay: 1000,
                    backoffFactor: 2,
                    timeout: 30000
                },
                dash: {
                    ignoreMinBufferTime: true,
                    autoCorrectDrift: true
                }
            },
            abr: {
                enabled: true,
                defaultBandwidthEstimate: 2000000,
                restrictions: {
                    minBandwidth: 500000,
                    maxBandwidth: 8000000
                }
            }
        };

        player.configure(drmConfig);

        // Error handling with auto-recovery
        player.addEventListener('error', (event) => {
            const error = event.detail;
            console.error('Shaka error:', error.code, error.message);
            
            if (error.code === 1002 || error.code === 1003 || error.code === 2000) {
                console.log('Auto-recovering...');
                setTimeout(() => {
                    if (player) {
                        try {
                            player.retryStreaming();
                        } catch(e) {
                            if (retryCount < 3) {
                                retryCount++;
                                initPlayer();
                            }
                        }
                    }
                }, 2000);
            } else if (retryCount < 3) {
                retryCount++;
                setTimeout(() => initPlayer(), 3000);
            }
        });

        // Keep alive mechanism
        const keepAlive = () => {
            if (!video || !player) return;
            if (video.ended) {
                console.log('Stream ended, reloading...');
                initPlayer();
            }
        };
        
        keepAliveInterval = setInterval(keepAlive, 10000);
        
        // Initialize Shaka UI
        const uiConfig = {
            controlPanelElements: [
                'play_pause',
                'time_and_duration',
                'volume',
                'fullscreen',
                'overflow_menu'
            ],
            addSeekBar: true
        };

        ui = new shaka.ui.Overlay(player, videoContainer, video);
        ui.configure(uiConfig);

        // Load the stream
        try {
            await player.load(channel.manifest);
            retryCount = 0;
            
            // Hide total time display for live streams
            const hideTimeDisplay = () => {
                const totalTime = document.querySelector('.shaka-total-time');
                const currentTime = document.querySelector('.shaka-current-time');
                if (totalTime) totalTime.style.display = 'none';
                if (currentTime) currentTime.style.display = 'none';
                
                const seekBar = document.querySelector('.shaka-seek-bar');
                if (seekBar) seekBar.style.width = '100%';
            };
            
            setTimeout(hideTimeDisplay, 500);
            setInterval(hideTimeDisplay, 5000);
            
            // Unmute and set volume
            video.muted = false;
            video.volume = 0.8;
            
            try {
                await video.play();
                console.log(`Playing: ${channel.name}`);
            } catch (playErr) {
                console.log('Autoplay blocked. Click play to start.');
            }
            
        } catch (error) {
            console.error('Load error:', error);
            if (retryCount < 3) {
                retryCount++;
                setTimeout(() => initPlayer(), 3000);
            }
        }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', initPlayer);

    // Cleanup
    window.addEventListener('beforeunload', () => {
        if (keepAliveInterval) clearInterval(keepAliveInterval);
        if (ui) ui.destroy();
        if (player) player.destroy();
    });
</script>
</body>
</html>
