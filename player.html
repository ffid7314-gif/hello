        // PLAYER CODE - DON'T CHANGE BELOW

        const infoDiv = document.getElementById('info');
        const streamSelect = document.getElementById('streamSelect');
        
        // Populate dropdown with all streams
        videoConfigs.forEach(config => {
            const option = document.createElement('option');
            option.value = config.id;
            option.textContent = config.name || config.id;
            streamSelect.appendChild(option);
        });
        
        function updateInfo(message, isError = false) {
            infoDiv.innerHTML = message;
            infoDiv.className = isError ? 'info error' : 'info';
            console.log(message);
        }
        
        // Request filter for headers
        function requestFilter(request) {
            request.headers['Origin'] = 'https://rzn079.github.io';
            request.headers['Referer'] = 'https://rzn079.github.io/blogs/v2.html';
        }
        
        async function loadSelectedStream() {
            const id = streamSelect.value;
            if (!id) {
                updateInfo('Please select a stream from the dropdown', true);
                return;
            }
            await loadStream(id);
        }
        
        async function loadStream(id) {
            const config = videoConfigs.find(cfg => cfg.id === id);
            if (!config) {
                updateInfo(`Stream "${id}" not found`, true);
                return;
            }
            
            updateInfo(`Loading: ${config.name || config.id}...`);
            
            const video = document.getElementById('video');
            const ui = video['ui'];
            const controls = ui.getControls();
            const player = controls.getPlayer();
            
            // Add request headers
            player.getNetworkingEngine().registerRequestFilter(requestFilter);
            
            // Setup DRM
            if (config.drmConfig && Object.keys(config.drmConfig.clearKeys || {}).length > 0) {
                updateInfo(`Setting up DRM for ${config.name || config.id}...`);
                player.configure({ drm: config.drmConfig });
            }
            
            try {
                await player.load(config.manifestUri);
                updateInfo(`✅ Playing: ${config.name || config.id}`);
                await video.play();
            } catch (error) {
                updateInfo(`❌ Error: ${error.message}`, true);
                console.error('Full error:', error);
            }
        }
        
        async function init() {
            updateInfo('✅ Player ready. Select a channel from the dropdown.');
        }
        
        document.addEventListener('shaka-ui-loaded', init);
        
        // Auto-load UNIVERSO after 1 second (like original)
        setTimeout(() => {
            if (streamSelect.children.length > 0) {
                streamSelect.value = "UNIVERSO";
                loadStream("UNIVERSO");
